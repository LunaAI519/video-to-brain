services:
  bot:
    build: .
    container_name: video-to-brain
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount your Obsidian vault (change left side to your vault path)
      - ./vault:/data/vault
      # Persistent cache for Pyrogram sessions and downloaded videos
      - ./cache:/data/cache
    environment:
      - OBSIDIAN_VAULT=/data/vault
    # Whisper models are memory-heavy; adjust based on your model size:
    #   tiny/base: 1g | small: 2g | medium: 4g | turbo/large: 6g
    deploy:
      resources:
        limits:
          memory: 4g
